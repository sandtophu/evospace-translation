[description]
Spawner=A block for setting the player's respawn point.
FissionReactor=Uses controlled nuclear reactions to generate heat.
SolarPanel=Converts solar energy into electricity with high efficiency.
Sifter=Sifts ore gravel to extract rare resources.
Constructor=Basic automatic assembler for blocks and items.
Destroyer=Permanently destroys raw resources and disassembles machines and blocks into some of their components.
ChemicalBath=Washes ore gravel with strong acids to extract rare resources.
Fermenter=Processes organic matter into fluids and gases.
ItemRack=Stores a large quantity of a single item type.
Electrolyzer=Breaks down resources into components using electricity.
IndustrialGenerator=High-power electricity generator.
SmallSolarPanel=Converts solar energy into electricity.
Macerator=Grinds gravel for further processing. Turns plates to dust.
Separator=Separates the dust into components.
AutomaticHammer=Produces plates from ingots. Grinds ore to gravel.
Boiler=Turns heat and water into steam.
Pipe=Fluid conductor.
HeatPipe=Heat conductor.
Flywheel=Kinetic energy conductor.
Connector=Electricity conductor.
OreWasher=Extracts additional resources from ore.
Container=Fluid storage.
SteamEngine=Converts steam into kinetic energy.
StirlingEngine=Converts heat into kinetic energy.
CombustionEngine=Burns liquid fuel to generate kinetic energy.
PyrolysisUnit=Breaks down a fuel into smaller components.
Generator=Converts kinetic energy into electricity.
CompactGenerator=Converts kinetic energy into electricity.
ElectricEngine=Converts electricity into kinetic energy.
RobotArm=Moves items between devices and conveyors.
Pump=Moves liquids between devices and pipes. Can be placed underwater to collect water.
FilteringPump=Moves liquids between devices and pipes.
Smelter=A primitive stone foundry. It is used for smelting copper, glass and gold.
SteamTurbine=Converts steam energy into kinetic energy.
ArcSmelter=Advanced smelter. Suitable for stainless steel smelting.
Furnace=Burns solid fuel to generate heat.
Oven=Device for the production of charcoal, coke and clay firing.
BlastFurnace=Furnace for smelting steel.
FluidFurnace=Burns liquid fuel to generate heat.
ElectricFurnace=Uses electricity to generate heat.
BatteryBox=Big and efficient energy storage.
DrillingRig=Automated device for mining ore and stone. Deposits are marked on the global map.
Assembler=A device for efficient assembling small items and circuits.
Lamp=Light source. Configurable.
Mixer=Device for producing mixes.
AutomaticFarm=Automated device for growing plants. Consumes water. Soil fertility decreases with each operation.
AtmosphericCondenser=Collects liquids and gases from the atmosphere.
Terminal=Displays the graphical interface of the device in front of it.
Computer=Creates research points.
QuantumComputer=Creates quantum research points.
IndustrialSeparator=Separates the dust into components.
Radiator=Destroys heat energy.
Diode=Conducts electricity only in one direction.
Pumpjack=Automated device for the extraction of liquids. Deposits are marked on the global map. Use the scanner to search for new deposits.
IndustrialSmelter=Advanced smelter. It is used for smelting titanium and graphite.
IndustrialElectricEngine=Very powerfull electric engine.
IndustrialSteamTurbine=Very powerful hybrid of steam turbine and generator.
Riteg=Infinite radioisotope heat source.
FusionReactor=Neutronium source.
IndustrialBoiler=Very powerful boiler with big internal buffer.
KineticHeater=Converts kinetic energy into heat.

